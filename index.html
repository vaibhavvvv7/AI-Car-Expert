<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Car Expert</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <video autoplay loop muted playsinline id="bg-video">
        <source src="attached_video.mp4" type="video/mp4">
    </video>

    <div class="glass-container">
        <header>
            <h1>AI Car Expert</h1>
            <p>Your AI-powered automotive consultant</p>
        </header>

        <div class="input-group">
            <input type="text" id="userInput" placeholder="E.g., I have 15 Lakhs, looking for a safe family SUV">
            <button id="askButton">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                Ask Now
            </button>
        </div>

        <div id="responseContainer" class="response-box"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyB4aVIDxhiFBxgAGDnQDoZrdJSsdXiOZEU"

        const expertPrompt = `Act as an expert Indian automotive consultant. Your goal is to recommend the best cars currently available in the Indian market based on my budget and specific needs. When I provide a budget (in INR) and my preferences, you must recommend the top 2 to 3 cars that perfectly fit my criteria. 

For each recommendation, provide the following structured breakdown:
1. Make, Model, and Recommended Variant/Trim.
2. Estimated Price: Approximate On-Road price in INR (Lakhs/Crores).
3. Core Specifications: Engine Capacity & Type, Transmission, Power (BHP), Torque (Nm), and Claimed Fuel Efficiency (kmpl) or EV Range.
4. Safety & Features: Global NCAP or Bharat NCAP rating, airbags, and standout comfort/tech features.
5. Pros and Cons: The biggest practical advantage and most notable drawback for Indian road conditions.
6. The Best Buy Verdict: A paragraph analyzing how the car balances fuel efficiency, power, ride comfort, and maintenance costs.
7. Video Reviews: Provide 2 highly relevant YouTube search queries or direct links for detailed reviews and walkarounds from top Indian automotive channels like Autocar India, MotorInc, or Evo India.`;

        const inputElement = document.getElementById("userInput");
        const buttonElement = document.getElementById("askButton");
        const responseContainer = document.getElementById("responseContainer");

        buttonElement.addEventListener("click", async () => {
            const userText = inputElement.value;

            if (!userText) {
                responseContainer.innerText = "Please enter your budget and preferences.";
                return;
            }

            responseContainer.innerText = "Consulting the expert...";

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            systemInstruction: {
                                parts: [{ text: expertPrompt }]
                            },
                            contents: [
                                {
                                    parts: [{ text: userText }],
                                },
                            ],
                        }),
                    }
                );

                const data = await response.json();

                if (data.candidates && data.candidates.length > 0) {
                    const answer = data.candidates[0].content.parts[0].text;
                    responseContainer.innerHTML = marked.parse(answer);
                } else {
                    responseContainer.innerText = "Error: Unexpected response format.";
                    console.log(data);
                }

            } catch (error) {
                responseContainer.innerText = "An error occurred. Check the console.";
                console.error(error);
            }
        });
    </script>
</body>

</html>
